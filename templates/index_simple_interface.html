<!DOCTYPE html>
<html>
<head>
    <title>Areca Disease Detection</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            background:#f0fff0;
            margin-top:50px;
        }

        .box{
            width:450px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        img{
            width:250px;
            margin-top:20px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>🌴 Areca Plant Disease Detection</h1>

    <form action="/predict" method="post" enctype="multipart/form-data">

        <input type="file" name="file" required>
        <br><br>

        <button type="submit">Predict</button>

    </form>

  {% if prediction %}
<h2>Disease: {{ prediction }}</h2>
<h3>Confidence: {{ confidence }}%</h3>

<img src="{{ image_path }}" width="300">
{% endif %}
</div>

</body>
</html>
